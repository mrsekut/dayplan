<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>dayplan</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.container { max-width: 700px; margin: 0 auto; padding: 16px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.header h1 { font-size: 18px; font-weight: 600; }
.pip-btn { background: #238636; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.pip-btn:hover { background: #2ea043; }
.timeline { position: relative; margin-left: 60px; }
.hour-label { position: absolute; left: -60px; width: 50px; text-align: right; font-size: 12px; color: #8b949e; transform: translateY(-8px); }
.hour-line { position: absolute; left: 0; right: 0; border-top: 1px solid #21262d; }
.entry { position: absolute; left: 8px; right: 8px; border-radius: 6px; padding: 6px 10px; overflow: hidden; border-left: 3px solid; }
.entry-fixed { background: #3d1f1f; border-color: #e07e4f; }
.entry-work { background: #161b22; border-color: #30363d; }
.entry-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-item { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12px; }
.task-item.active { color: #58a6ff; font-weight: 600; }
.task-item.completed { color: #8b949e; text-decoration: line-through; }
.task-item.skipped { color: #8b949e; text-decoration: line-through; }
.task-kind { font-size: 10px; padding: 1px 4px; border-radius: 3px; }
.kind-focus { background: #1e2d4a; color: #7eb3e0; }
.kind-batch { background: #1e3a2f; color: #7ecba1; }
.kind-mtg { background: #3a1e1e; color: #e0a07e; }
.kind-other { background: #1a1a1a; color: #666; }
.now-line { position: absolute; left: 0; right: 0; border-top: 2px solid #f85149; z-index: 10; pointer-events: none; }
.now-dot { position: absolute; left: -5px; top: -5px; width: 10px; height: 10px; background: #f85149; border-radius: 50%; }
.action-btn { background: none; border: 1px solid #30363d; color: #e6edf3; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-left: 4px; }
.action-btn:hover { background: #30363d; }
.action-btn.complete-btn:hover { background: #238636; border-color: #238636; }
.action-btn.skip-btn:hover { background: #6e4000; border-color: #6e4000; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { createElement as h, useState, useEffect, useCallback, useRef } from 'https://esm.sh/react@19?bundle';
import { createRoot } from 'https://esm.sh/react-dom@19/client?bundle';

const PX_PER_MIN = 4.5;
const DAY_START = 9 * 60;
const DAY_END = 18 * 60;
const DATE = document.title.replace('dayplan - ', '');

function timeToMin(t) { const [h,m] = t.split(':').map(Number); return h*60+m; }
function minToPos(m) { return (m - DAY_START) * PX_PER_MIN; }

function App() {
  const [plan, setPlan] = useState(null);
  const [now, setNow] = useState(Date.now());
  const pipWinRef = useRef(null);
  const planRef = useRef(null);

  const reload = useCallback(async () => {
    const r = await fetch('/api/plan/' + DATE);
    if (r.ok) { const p = await r.json(); setPlan(p); planRef.current = p; }
  }, []);

  useEffect(() => { reload(); }, [reload]);
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 10000);
    return () => clearInterval(id);
  }, []);

  const doAction = useCallback(async (action) => {
    await fetch('/api/' + action, { method: 'POST' });
    await reload();
  }, [reload]);

  const openPip = useCallback(async () => {
    if (!window.documentPictureInPicture) { alert('PiP not supported'); return; }
    const pw = await window.documentPictureInPicture.requestWindow({ width: 380, height: 130 });
    pipWinRef.current = pw;
    pw.document.head.innerHTML = '<style>' + PIP_STYLES + '</style>';
    pw.document.body.innerHTML = '<div id="pip-root"></div>';
    pw.document.body.addEventListener('click', async (e) => {
      if (e.target.dataset.action) {
        await doAction(e.target.dataset.action);
        updatePipContent(pw, planRef.current, Date.now());
      }
    });
    updatePipContent(pw, planRef.current, Date.now());
    const id = setInterval(() => {
      if (pw.closed) { clearInterval(id); return; }
      updatePipContent(pw, planRef.current, Date.now());
    }, 1000);
  }, [doAction]);

  // Update pip when plan changes
  useEffect(() => {
    planRef.current = plan;
    if (pipWinRef.current && !pipWinRef.current.closed) {
      updatePipContent(pipWinRef.current, plan, Date.now());
    }
  }, [plan]);

  if (!plan) return h('div', {className:'container'}, 'Loading...');

  const d = new Date();
  const nowMin = d.getHours()*60 + d.getMinutes();
  const totalHeight = (DAY_END - DAY_START) * PX_PER_MIN;
  const hours = [];
  for (let hr = Math.floor(DAY_START/60); hr <= Math.floor(DAY_END/60); hr++) {
    hours.push(hr);
  }

  return h('div', {className:'container'},
    h('div', {className:'header'},
      h('h1', null, '\u{1F4C5} ' + plan.date),
      h('button', {className:'pip-btn', onClick: openPip}, '\u{1F4CC} PiP')
    ),
    h('div', {className:'timeline', style:{height: totalHeight, position:'relative'}},
      ...hours.map(hr =>
        h('div', {key:'h'+hr},
          h('span', {className:'hour-label', style:{top: minToPos(hr*60)}}, String(hr).padStart(2,'0') + ':00'),
          h('div', {className:'hour-line', style:{top: minToPos(hr*60)}})
        )
      ),
      ...plan.entries.map((entry, i) => {
        const top = minToPos(timeToMin(entry.start));
        const height = (timeToMin(entry.end) - timeToMin(entry.start)) * PX_PER_MIN;
        if (entry.type === 'fixed') {
          return h('div', {key:'e'+i, className:'entry entry-fixed', style:{top, height: Math.max(height-2, 20)}},
            h('div', {className:'entry-title'}, (entry.kind==='mtg'?'\u{1F5E3}\uFE0F ':'\u{1F4CC} ') + entry.title)
          );
        }
        return h('div', {key:'e'+i, className:'entry entry-work', style:{top, height: Math.max(height-2, 20)}},
          ...entry.queue.map((task, j) =>
            h('div', {key:'t'+j, className:'task-item ' + task.status},
              task.status==='active' ? '\u25B6 ' : task.status==='completed' ? '\u2713 ' : task.status==='skipped' ? '\u2717 ' : '\u00B7 ',
              h('span', null, task.title),
              h('span', null, ' (' + task.estimatedMinutes + 'm)'),
              h('span', {className:'task-kind kind-'+task.kind}, task.kind),
              task.status==='active' ? h('span', null,
                h('button', {className:'action-btn complete-btn', onClick:()=>doAction('complete')}, '\u2713'),
                h('button', {className:'action-btn skip-btn', onClick:()=>doAction('skip')}, '\u23ED')
              ) : null
            )
          )
        );
      }),
      nowMin >= DAY_START && nowMin <= DAY_END ?
        h('div', {className:'now-line', style:{top: minToPos(nowMin)}},
          h('div', {className:'now-dot'})
        ) : null
    )
  );
}

const PIP_STYLES = `
body { margin:0; padding:8px; background:#0d1117; color:#e6edf3; font-family:-apple-system,sans-serif; }
.pip-task { font-size:15px; font-weight:600; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pip-time { font-size:12px; color:#8b949e; margin-bottom:6px; }
.pip-bar { height:4px; background:#21262d; border-radius:2px; overflow:hidden; margin-bottom:8px; }
.pip-fill { height:100%; background:#58a6ff; transition:width 1s linear; }
.pip-actions { display:flex; gap:6px; }
.pip-btn { flex:1; padding:4px; border:1px solid #30363d; background:none; color:#e6edf3; border-radius:4px; cursor:pointer; font-size:12px; }
.pip-btn:hover { background:#30363d; }
.pip-btn.complete:hover { background:#238636; border-color:#238636; }
.pip-btn.skip:hover { background:#6e4000; border-color:#6e4000; }
`;

function updatePipContent(pw, plan, now) {
  if (!plan || pw.closed) return;
  const root = pw.document.getElementById('pip-root');
  if (!root) return;
  const d = new Date(now);
  const nowMin = d.getHours()*60 + d.getMinutes();

  let currentSlot = null, activeTask = null, slotRemain = 0;
  for (const e of plan.entries) {
    if (timeToMin(e.start) <= nowMin && nowMin < timeToMin(e.end)) {
      if (e.type === 'work') {
        currentSlot = e;
        slotRemain = timeToMin(e.end) - nowMin;
        activeTask = e.queue.find(t => t.status === 'active');
      } else if (e.type === 'fixed') {
        activeTask = { title: e.title, estimatedMinutes: timeToMin(e.end)-timeToMin(e.start) };
        slotRemain = timeToMin(e.end) - nowMin;
      }
      break;
    }
  }

  if (!activeTask) {
    root.innerHTML = '<div class="pip-task">\u30BF\u30B9\u30AF\u306A\u3057</div>';
    return;
  }

  const progress = currentSlot ? (1 - slotRemain / (timeToMin(currentSlot.end) - timeToMin(currentSlot.start))) : 0;

  root.innerHTML = `
    <div class="pip-task">${activeTask.title}</div>
    <div class="pip-time">\u6B8B\u308A ${slotRemain}\u5206 (\u4F5C\u696D\u679A)</div>
    <div class="pip-bar"><div class="pip-fill" style="width:${Math.min(progress*100,100)}%"></div></div>
    <div class="pip-actions">
      <button class="pip-btn complete" data-action="complete">\u2713 \u5B8C\u4E86</button>
      <button class="pip-btn skip" data-action="skip">\u23ED \u30B9\u30AD\u30C3\u30D7</button>
    </div>
  `;
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
